      <!-- Uma única instanciação do PandaPlayer pra esse id, com onReady mesclando

           separadas pro mesmo iframe criariam dois listeners de "message"

           loadButtonInTime NÃO é mais chamado de propósito: era o mecanismo

<script>
  // Constrói nosso próprio botão de CTA a partir dos dados reais configurados
  // no painel da Panda (texto, link de destino, cores) — buscados direto do
  // mesmo endpoint de config já pré-carregado no <head>. Roda independente
  // do estado/tempo do vídeo, então o botão já está pronto (com conteúdo
  // real) desde o load da página, e a exibição (controlada pelo script do
  // player, acima) só precisa alternar um display:flex/none.
  (function () {
    'use strict';
    var CONFIG_URL = 'https://config.tv.pandavideo.com.br/vz-52703098-ed8/26f48aa6-b264-4f01-b715-686047419eca.json';
    var CONTAINER_ID = 'f86c3daa-4903-428f-b756-dd0ef5176a06';
    var CTA_LINK = 'https://hub.la/r/ZjM4OlSMkHaWO6rJXyin';

    fetch(CONFIG_URL)
      .then(function (r) { return r.json(); })
      .then(function (data) {
        var cta = data && data.outsideCta && data.outsideCta[0];
        var meta = cta && cta.metadata;
        if (!cta) return;

        var bg = meta.backgroundColor || '#00bd16';
        var bgHover = meta.backgroundHover || bg;

        var btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'upsell-cta-button';
        btn.textContent = cta.title || meta.title || 'Quero garantir minha oferta';
        btn.style.backgroundColor = bg;
        btn.style.color = meta.textColor || '#FFFFFF';
        btn.addEventListener('mouseenter', function () { btn.style.backgroundColor = bgHover; });
        btn.addEventListener('mouseleave', function () { btn.style.backgroundColor = bg; });
        btn.addEventListener('click', function () { window.open(CTA_LINK, '_blank'); });

        var container = document.getElementById(CONTAINER_ID);
        if (container) container.appendChild(btn);
      })
      .catch(function (e) { console.error('Upsell CTA: falha ao buscar configuração do botão', e); });
  })();
</script>
